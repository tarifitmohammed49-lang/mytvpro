<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTVPRO</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --main-red: #ff3b5c; --bg-black: #0b0e11; --card-bg: #161b22; }
        body { background-color: var(--bg-black); color: white; font-family: Arial, sans-serif; margin: 0; padding: 10px; user-select: none; }
        
        /* الهيدر واللوجو */
        .header { text-align: center; padding: 20px 0; }
        .logo { color: var(--main-red); font-size: 28px; font-weight: bold; text-decoration: none; }
        
        /* شريط اللغات الـ 11 كما في الصورة */
        .lang-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { color: #888; font-size: 12px; cursor: pointer; font-weight: bold; text-decoration: none; }
        .lang-btn.active { color: var(--main-red); border-bottom: 2px solid var(--main-red); }

        /* صندوق تحميل التطبيق - مطابق للصورة */
        .apk-box { border: 2px solid var(--main-red); border-radius: 20px; padding: 15px; margin: 0 auto 20px; max-width: 500px; display: flex; align-items: center; justify-content: space-between; background: rgba(255, 59, 92, 0.05); }
        .apk-info { display: flex; align-items: center; gap: 10px; }
        .apk-icon { width: 50px; height: 50px; border-radius: 5px; }
        .apk-text { font-size: 12px; color: #ccc; line-height: 1.4; }
        .apk-btn { background: var(--main-red); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; }

        /* الأقسام - أزرار دائرية سوداء */
        .nav-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tab { background: #1a1d21; color: white; padding: 10px 20px; border-radius: 25px; border: 1px solid #333; cursor: pointer; white-space: nowrap; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .tab.active { background: var(--main-red); border-color: var(--main-red); }

        /* حقل البحث */
        .search-box { width: 100%; max-width: 500px; margin: 10px auto 20px; position: relative; }
        .search-box input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #1a1d21; color: white; outline: none; box-sizing: border-box; }

        /* شبكة الأفلام */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .movie-card { background: #1a1d21; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .movie-card img { width: 100%; height: 210px; object-fit: cover; }
        .movie-title { padding: 8px; font-size: 12px; text-align: center; height: 35px; overflow: hidden; }

        /* زر عرض المزيد الأحمر - مطابق للصورة */
        .load-more-container { text-align: center; margin: 30px 0; }
        .load-more-btn { background: var(--main-red); color: white; border: none; padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* المشغل */
        #playerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .player-header { padding: 10px; text-align: center; }
        .back-btn { background: transparent; color: white; border: 1px solid var(--main-red); padding: 8px 30px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="#" class="logo">MYTVPRO</a>
    </div>

    <div class="lang-bar" id="langBar">
        <span class="lang-btn active" onclick="setLang('en', this)">EN</span>
        <span class="lang-btn" onclick="setLang('ar', this)">AR</span>
        <span class="lang-btn" onclick="setLang('fr', this)">FR</span>
        <span class="lang-btn" onclick="setLang('es', this)">ES</span>
        <span class="lang-btn" onclick="setLang('de', this)">DE</span>
        <span class="lang-btn" onclick="setLang('it', this)">IT</span>
        <span class="lang-btn" onclick="setLang('pt', this)">PT</span>
        <span class="lang-btn" onclick="setLang('ru', this)">RU</span>
        <span class="lang-btn" onclick="setLang('tr', this)">TR</span>
        <span class="lang-btn" onclick="setLang('hi', this)">HI</span>
        <span class="lang-btn" onclick="setLang('zh', this)">ZH</span>
    </div>

    <div class="apk-box">
        <div class="apk-info">
            <img src="https://mytvpro1.github.io/favicon.ico" class="apk-icon">
            <div class="apk-text">
                <b id="apkT">Simo TV App (OFFICIAL)</b><br>
                <span id="apkD">Download the app to watch sports channels for free.</span>
            </div>
        </div>
        <a href="https://www.appcreator24.com/app3987277-rntplh" class="apk-btn">DOWNLOAD APK</a>
    </div>

    <div class="nav-tabs">
        <button id="tab-feat" class="tab active" onclick="loadFeatured()">⭐ <span id="txt-feat">Featured</span></button>
        <button id="tab-live" class="tab" onclick="loadLive()">⚽ <span id="txt-live">Live Foot</span></button>
        <button class="tab" onclick="loadGenre(28, 'movie')">🔥 Action</button>
        <button class="tab" onclick="loadType('movie')">Movies</button>
        <button class="tab" onclick="loadType('tv')">Series</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInp" placeholder="Search Movies & Series..." onkeyup="search(event)">
    </div>

    <div id="grid" class="movie-grid"></div>

    <div class="load-more-container" id="loadMoreArea">
        <button class="load-more-btn" onclick="loadNextPage()" id="txt-more">SHOW MORE / عرض المزيد</button>
    </div>

    <div id="playerOverlay">
        <div class="player-header"><button class="back-btn" onclick="closePlayer()">BACK</button></div>
        <iframe id="ifr" width="100%" height="400px" frameborder="0" allowfullscreen style="display:none;"></iframe>
        <div id="v-cont" style="display:none;"></div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="channels_data.js"></script>

    <script>
        const API_KEY = "acd9d88a83b5272588d21d5b4401eab6";
        let curLang = 'en', curPage = 1, curType = 'movie', curGenre = null, isFeat = true;

        const langData = {
            en: { feat: "Featured", live: "Live Foot", more: "SHOW MORE", apkT: "Simo TV App (OFFICIAL)", apkD: "Download for sports." },
            ar: { feat: "المميزة", live: "بث مباشر", more: "عرض المزيد", apkT: "تطبيق سيمو TV", apkD: "حمل التطبيق للمشاهدة مجاناً." }
            // سيتم تطبيق الباقي تلقائياً عبر API TMDb
        };

        function setLang(code, el) {
            curLang = code;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            if(langData[code]) {
                document.getElementById('txt-feat').innerText = langData[code].feat;
                document.getElementById('txt-live').innerText = langData[code].live;
                document.getElementById('txt-more').innerText = langData[code].more;
            }
            isFeat ? loadFeatured() : fetchMovies();
        }

        async function loadFeatured() {
            isFeat = true; curPage = 1; updateTabs('tab-feat');
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            const items = [{id:93405,t:'tv'},{id:1396,t:'tv'},{id:157336,t:'movie'},{id:634649,t:'movie'}];
            for(let i of items) {
                const r = await fetch(`https://api.themoviedb.org/3/${i.t}/${i.id}?api_key=${API_KEY}&language=${curLang}`);
                const m = await r.json();
                grid.innerHTML += render(m, i.t);
            }
            document.getElementById('loadMoreArea').style.display = 'none';
        }

        async function fetchMovies() {
            let url = curGenre 
                ? `https://api.themoviedb.org/3/discover/${curType}?api_key=${API_KEY}&with_genres=${curGenre}&page=${curPage}&language=${curLang}`
                : `https://api.themoviedb.org/3/${curType}/popular?api_key=${API_KEY}&page=${curPage}&language=${curLang}`;
            const r = await fetch(url);
            const d = await r.json();
            const grid = document.getElementById('grid');
            if(curPage === 1) grid.innerHTML = "";
            d.results.forEach(m => grid.innerHTML += render(m, curType));
            document.getElementById('loadMoreArea').style.display = 'block';
        }

        function loadNextPage() { curPage++; fetchMovies(); }

        function loadType(t) { isFeat = false; curType = t; curGenre = null; curPage = 1; updateTabs(''); fetchMovies(); }
        function loadGenre(g, t) { isFeat = false; curType = t; curGenre = g; curPage = 1; fetchMovies(); }

        function loadLive() {
            isFeat = false; updateTabs('tab-live');
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            const data = (typeof _0xSimoData !== 'undefined') ? _0xSimoData : [];
            data.forEach(ch => {
                grid.innerHTML += `<div class="movie-card" onclick="playLive('${ch.url}')">
                    <img src="${ch.logo}" style="object-fit:contain; padding:20px;">
                    <div class="movie-title">${ch.name}</div>
                </div>`;
            });
            document.getElementById('loadMoreArea').style.display = 'none';
        }

        function playLive(enc) {
            const url = atob(enc);
            const ov = document.getElementById('playerOverlay');
            ov.style.display = 'block';
            document.getElementById('ifr').style.display = 'none';
            const cont = document.getElementById('v-cont');
            cont.style.display = 'block';
            cont.innerHTML = '<video id="vjs" class="video-js vjs-default-skin vjs-big-play-centered" controls width="100%" height="400px"></video>';
            const p = videojs('vjs');
            p.src({ src: url, type: url.includes('.ts')?'video/mp2t':'application/x-mpegURL' });
            p.play();
        }

        function openMovie(id, t) {
            const ov = document.getElementById('playerOverlay');
            ov.style.display = 'block';
            document.getElementById('v-cont').style.display = 'none';
            const ifr = document.getElementById('ifr');
            ifr.style.display = 'block';
            ifr.src = `https://vidsrc.me/embed/${t}?tmdb=${id}`;
        }

        function closePlayer() {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('ifr').src = '';
            const old = videojs.getPlayer('vjs');
            if(old) old.dispose();
        }

        function render(m, t) {
            return `<div class="movie-card" onclick="openMovie('${m.id}','${t}')">
                <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                <div class="movie-title">${m.title || m.name}</div>
            </div>`;
        }

        function updateTabs(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        window.onload = loadFeatured;
    </script>
</body>
</html>
