<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simo Final - Live TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* تصميم Simo Final المختصر */
        body { background: #0f0f0f; color: white; font-family: Arial; text-align: center; margin: 0; }
        header { background: #1a1a1a; padding: 20px; border-bottom: 2px solid #ed1c24; }
        .logo { font-size: 24px; font-weight: bold; color: #ed1c24; }
        
        #player-container { max-width: 800px; margin: 20px auto; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; aspect-ratio: 16/9; }

        .ads-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .ad-box { width: 150px; height: 50px; background: #222; border: 1px dashed #555; line-height: 50px; font-size: 12px; }

        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; max-width: 1000px; margin: auto; }
        .channel-card { background: #1a1a1a; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .channel-card:hover { transform: scale(1.05); border-color: #ed1c24; }
        .channel-card img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 8px; }
        .channel-card h3 { font-size: 14px; margin: 5px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .disclaimer { font-size: 10px; color: #777; padding: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">SIMO LIVE PRO</div>
</header>

<div class="ads-container">
    <div class="ad-box">Ad 1</div><div class="ad-box">Ad 2</div>
</div>

<div id="player-container">
    <video id="video" controls></video>
</div>

<div class="ads-container">
    <div class="ad-box">Ad 3</div><div class="ad-box">Ad 4</div>
</div>

<div class="channels-grid" id="channels-container">
    <p>جاري سحب الروابط من القناص...</p>
</div>

<div class="disclaimer">
    هذا الموقع مجرد مشغل للروابط العامة. نحن لا نستضيف أي محتوى محمي على خوادمنا.<br>
    © 2026 Simo Final Project
</div>

<script>
    const video = document.getElementById('video');
    const container = document.getElementById('channels-container');

    // 1. وظيفة تشغيل الرابط
    function playStream(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 2. جلب القنوات من ملف links.json
    async function fetchChannels() {
        try {
            // جلب ملف الروابط الذي ينتجه GitHub Actions
            const res = await fetch('links.json');
            const data = await res.json();
            
            container.innerHTML = ''; // تنظيف الشاشة

            // دمج كل القنوات من الأقسام المختلفة في مصفوفة واحدة للعرض
            let allChannels = [];
            if (data.beIN_Sports) allChannels = [...allChannels, ...data.beIN_Sports];
            if (data.fr_sport) allChannels = [...allChannels, ...data.fr_sport];
            if (data.Sports) allChannels = [...allChannels, ...data.Sports];

            allChannels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => playStream(ch.url);
                card.innerHTML = `
                    <img src="${ch.logo}" alt="${ch.name}" onerror="this.src='https://via.placeholder.com/150?text=TV'">
                    <h3>${ch.name}</h3>
                `;
                container.appendChild(card);
            });

        } catch (e) {
            container.innerHTML = '<p>خطأ: تأكد من تشغيل GitHub Action أولاً لإنشاء ملف links.json</p>';
        }
    }

    window.onload = fetchChannels;
</script>

</body>
</html>
