<body>

    <div id="splash-screen">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="header">
        <div class="logo">MYTVPRO</div>
        <div class="lang-container">
            <span class="lang-btn active" onclick="setLang('en')">EN</span>
            <span class="lang-btn" onclick="setLang('ar')">AR</span>
        </div>
    </div>

    <div class="nav-tabs">
        <button id="btnFeatured" class="tab active featured" onclick="loadFeatured()">⭐ Featured</button>
        <button id="btnMovies" class="tab" onclick="loadContent('movie')">Movies</button>
        <button id="btnSeries" class="tab" onclick="loadContent('tv')">Series</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="handleSearch(event)">
    </div>

    <div id="moviesGrid" class="movie-grid"></div>

    <div class="show-more">
        <button onclick="loadMore()">SHOW MORE</button>
    </div>

    <div class="footer-app-box">
        <h3>GET MYTVPRO APP</h3>
        <p style="color: #888; font-size: 12px;">Faster experience, anytime, anywhere.</p>
        <a href="https://mytvpro1.github.io/mytvpro.apk" download class="footer-install-btn">INSTALL APP</a>
    </div>

    <footer class="main-footer-disclaimer">
        <div class="legal-item">MYTVPRO is an indexing engine only.</div>
        <div class="footer-copyright-pro">© 2026 MYTVPRO GLOBAL INDEX</div>
    </footer>

    <div id="videoPlayerContainer">
        <div class="player-wrapper">
            <button class="close-player-btn" onclick="closePlayer()">CLOSE</button>
            <div id="adOverlay" class="ad-overlay" onclick="triggerAd()"></div>
            <iframe id="mainPlayer" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // دالة الإعلان
        function triggerAd() {
            if(window.AdEngine) { 
                window.AdEngine("//rm358.com/4/10722756"); 
                localStorage.setItem('lastAdTime', new Date().getTime()); 
            }
            document.getElementById('adOverlay').style.display = 'none';
        }

        function openPlayer(id, type) {
            const now = new Date().getTime();
            const lastAd = localStorage.getItem('lastAdTime');
            const overlay = document.getElementById('adOverlay');

            // إظهار الإعلان فقط إذا مر 90 دقيقة
            if (!lastAd || (now - lastAd > 90 * 60 * 1000)) {
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }

            document.getElementById('mainPlayer').src = `https://vidsrc.me/embed/${type}?tmdb=${id}`;
            document.getElementById('videoPlayerContainer').style.display = 'block';
        }

        function closePlayer() { 
            document.getElementById('videoPlayerContainer').style.display = 'none'; 
            document.getElementById('mainPlayer').src = ''; 
        }

        async function loadFeatured() {
            const ids = [93405, 1396, 157336, 634649, 100088, 71446];
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = "";
            for(let id of ids) {
                const type = id > 100000 ? 'movie' : 'tv';
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${window.API_KEY}`);
                const m = await res.json();
                grid.innerHTML += `<div class="movie-card" onclick="openPlayer('${m.id}', '${type}')"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="movie-title">${m.title || m.name}</div></div>`;
            }
        }

        async function loadContent(type) {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/popular?api_key=${window.API_KEY}`);
            const data = await res.json();
            document.getElementById('moviesGrid').innerHTML = data.results.map(m => `<div class="movie-card" onclick="openPlayer('${m.id}', '${type}')"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="movie-title">${m.title || m.name}</div></div>`).join('');
        }

        async function handleSearch(e) {
            const q = e.target.value;
            if(q.length > 2) {
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${window.API_KEY}&query=${q}`);
                const data = await res.json();
                document.getElementById('moviesGrid').innerHTML = data.results.filter(i => i.poster_path).map(m => `<div class="movie-card" onclick="openPlayer('${m.id}', '${m.name?'tv':'movie'}')"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="movie-title">${m.title || m.name}</div></div>`).join('');
            }
        }

        window.onload = () => {
            loadFeatured();
            let w = 0;
            const bar = document.getElementById('progress-bar');
            const iv = setInterval(() => {
                w += 20; bar.style.width = w + '%';
                if(w >= 100) { clearInterval(iv); document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.display='none', 500); }
            }, 100);
        };
    </script>
</body>
