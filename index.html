<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTVPRO - Simo Global Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .logo { color: #ff3b5c; font-size: 26px; font-weight: bold; cursor: pointer; }
        .lang-container { display: flex; gap: 8px; }
        .lang-btn { color: #ff3b5c; font-weight: bold; cursor: pointer; font-size: 14px; padding: 5px; border: 1px solid transparent; }
        .lang-btn.active { border-bottom: 2px solid #ff3b5c; color: white; }
        .live-section { text-align: center; margin: 20px 0; }
        .main-live-selector { background: #1a1d21; border: 2px solid #ff3b5c; border-radius: 50px; display: inline-flex; align-items: center; padding: 12px 35px; cursor: pointer; box-shadow: 0 0 15px rgba(255, 59, 92, 0.3); }
        .live-dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; margin-left: 10px; animation: blink 1s infinite; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; backdrop-filter: blur(5px); }
        .channels-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; background: #1a1d21; border-radius: 20px; z-index: 3001; padding: 20px; border: 1px solid #ff3b5c; }
        .cat-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .cat-btn { flex: 1; background: #0b0e11; color: white; border: 1px solid #333; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .cat-btn.active { border-color: #ff3b5c; color: #ff3b5c; }
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; }
        .channel-card { background: #000; border-radius: 10px; padding: 10px; cursor: pointer; text-align: center; border: 1px solid #222; }
        #videoPlayerContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 95%; max-width: 850px; border: 2px solid #ff3b5c; border-radius: 10px; }
        .back-btn { background: #ff3b5c; color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="modalOverlay" class="modal-overlay" onclick="closeChannelsModal()"></div>
    <div id="channelsModal" class="channels-modal">
        <div class="cat-tabs">
            <button class="cat-btn active" id="btn-sport" onclick="loadCategory('ar_sport', 'btn-sport')">Sport / رياضة</button>
            <button class="cat-btn" id="btn-news" onclick="loadCategory('ar_news', 'btn-news')">News / أخبار</button>
        </div>
        <div id="channelsGrid" class="channels-grid"></div>
    </div>

    <div id="videoPlayerContainer">
        <button class="back-btn" onclick="closePlayer()">عودة / BACK</button>
        <video id="liveVideoPlayer" controls autoplay playsinline></video>
    </div>

    <div class="header">
        <div class="logo">MYTVPRO</div>
        <div class="lang-container">
            <span class="lang-btn active" onclick="changeLanguage('ar')">AR</span>
            <span class="lang-btn" onclick="changeLanguage('en')">EN</span>
            <span class="lang-btn" onclick="changeLanguage('fr')">FR</span>
            <span class="lang-btn" onclick="changeLanguage('de')">DE</span>
            <span class="lang-btn" onclick="changeLanguage('nl')">NL</span>
        </div>
    </div>

    <div class="live-section">
        <div class="main-live-selector" onclick="openChannelsModal()">
            <span class="live-dot"></span>
            <span id="liveTxt">اختر القناة المباشرة / LIVE TV</span>
        </div>
    </div>

    <script>
        let hlsPlayer = null;
        const JSON_FILE = "links.json";

        function changeLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('mainHtml').dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('liveTxt').innerText = (lang === 'ar') ? "اختر القناة المباشرة" : "Select Live Channel";
        }

        function openChannelsModal() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('channelsModal').style.display = 'block';
            loadCategory('ar_sport', 'btn-sport');
        }

        function closeChannelsModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('channelsModal').style.display = 'none';
        }

        async function loadCategory(catKey, btnId) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = "جاري التحميل...";

            try {
                const res = await fetch(JSON_FILE + "?t=" + Date.now());
                const data = await res.json();
                const channels = data[catKey] || [];
                grid.innerHTML = channels.map(ch => `
                    <div class="channel-card" onclick="startStream('${ch.url}')">
                        <img src="${ch.logo}" width="50" height="40" style="object-fit:contain">
                        <div style="font-size:11px; margin-top:5px;">${ch.name}</div>
                    </div>
                `).join('');
            } catch (e) { grid.innerHTML = "خطأ في الاتصال!"; }
        }

        function startStream(url) {
            closeChannelsModal();
            const video = document.getElementById('liveVideoPlayer');
            document.getElementById('videoPlayerContainer').style.display = 'flex';
            
            if (hlsPlayer) hlsPlayer.destroy();

            if (Hls.isSupported()) {
                hlsPlayer = new Hls({ xhrSetup: function(xhr) { xhr.withCredentials = false; } });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => { video.muted = true; video.play(); });
            } else { video.src = url; video.play(); }
        }

        function closePlayer() {
            document.getElementById('videoPlayerContainer').style.display = 'none';
            const video = document.getElementById('liveVideoPlayer');
            video.pause(); video.src = "";
            if (hlsPlayer) hlsPlayer.destroy();
        }
    </script>
</body>
</html>
