<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTVPRO - Global Streaming</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* الحفاظ على الهوية البصرية والقوالب كما هي تماماً دون أي تغيير */
        :root { --main-red: #ff3b5c; --bg-dark: #0b0e11; --card-bg: #1a1d21; }
        body { background-color: var(--bg-dark); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; user-select: none; }
        
        .header { text-align: center; padding: 20px 0; }
        .logo { color: var(--main-red); font-size: 28px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; cursor: pointer; }
        .lang-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .lang-btn { color: #888; font-size: 12px; font-weight: bold; cursor: pointer; text-decoration: none; padding: 5px; }
        .lang-btn.active { color: #fff; border-bottom: 2px solid var(--main-red); }

        .nav-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tab { background: var(--card-bg); color: #fff; padding: 10px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
        .tab.active { background: var(--main-red); }

        .search-box { width: 100%; max-width: 500px; margin: 10px auto 20px; position: relative; }
        .search-box input { width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #333; background: #111; color: #fff; outline: none; box-sizing: border-box; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; text-align: center; border: 1px solid #222; }
        .movie-card img { width: 100%; height: 190px; object-fit: cover; pointer-events: none; }
        .movie-title { padding: 8px; font-size: 11px; height: 35px; overflow: hidden; pointer-events: none; }

        .load-more-container { text-align: center; margin: 30px 0; }
        .load-more-btn { background: transparent; color: #fff; border: 2px solid var(--main-red); padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        .footer-legal { padding: 40px 20px; border-top: 1px solid #222; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 12px; color: #777; }
        .legal-item b { color: var(--main-red); display: block; margin-bottom: 5px; }

        #playerOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; }
        .close-p { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--main-red); color: #fff; border: none; padding: 10px 40px; border-radius: 20px; cursor: pointer; font-weight: bold; z-index: 11; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="location.reload()">MYTVPRO</div>
        <div class="lang-container" id="langContainer"></div>
    </header>

    <div class="nav-tabs">
        <button id="tab-live" class="tab active" onclick="loadLiveFoot()">⚽ Live Foot</button>
        <button class="tab" onclick="loadGenre(16, 'movie', this)">🌀 Anime</button>
        <button class="tab" onclick="loadGenre(28, 'movie', this)">🔥 Action</button>
        <button class="tab" onclick="loadGenre(27, 'movie', this)">💀 Horror</button>
        <button class="tab" onclick="loadGenre(10751, 'movie', this)">👶 Kids</button>
        <button class="tab" onclick="loadGenre(878, 'movie', this)">🚀 Sci-Fi</button>
        <button class="tab" onclick="loadContent('movie', this)">Movies</button>
        <button class="tab" onclick="loadContent('tv', this)">Series</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Movies & Series..." onkeyup="handleSearch(event)">
    </div>

    <div class="movie-grid" id="grid"></div>

    <div class="load-more-container" id="moreDiv" style="display:none;">
        <button class="load-more-btn" onclick="loadMore()">SHOW MORE / عرض المزيد</button>
    </div>

    <footer class="footer-legal">
        <div class="legal-item"><b>LEGAL DISCLAIMER (EN)</b> MYTVPRO is a specialized web indexing engine.</div>
        <div class="legal-item"><b>LEGAL DISCLAIMER (RO)</b> MYTVPRO este un motor de indexare web specializat.</div>
        <div style="grid-column: 1 / span 2; text-align: center; direction: rtl;"><b>إشعار قانوني</b> نحن محرك فهرسة وبحث فقط.</div>
    </footer>

    <div id="playerOverlay">
        <button class="close-p" onclick="closePlayer()">BACK / رجوع</button>
        <iframe id="ifr" width="100%" height="100%" frameborder="0" allowfullscreen style="display:none;"></iframe>
        <div id="vjs-box" style="display:none; width:100%; height:100%;"></div>
    </div>

    <script>
        const API_KEY = "acd9d88a83b5272588d21d5b4401eab6";
        const LIVE_PLAYLIST_URL = "https://opop.pro/dE3G9NgfeGVQQ";
        // البروكسي المستخدم لتجاوز قيود المتصفح
        const PROXY = "https://corsproxy.io/?"; 
        
        let curLang = 'en', curPage = 1, curType = 'movie', curGenre = null, isFeat = false;
        let hls = null;

        const langCodes = ['en','ro','ar','fr','de','nl','es','it','pt','tr','ru','zh'];
        const langNames = ['EN','RO','AR','FR','DE','NL','ES','IT','PT','TR','RU','中文'];

        const lBox = document.getElementById('langContainer');
        langCodes.forEach((c, i) => {
            lBox.innerHTML += `<span class="lang-btn ${c==='en'?'active':''}" onclick="setLang('${c}', this)">${langNames[i]}</span>`;
        });

        function setLang(c, el) {
            curLang = c;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            if (document.getElementById('tab-live').classList.contains('active')) {
                loadLiveFoot();
            } else {
                curPage = 1;
                fetchData(false);
            }
        }

        async function loadGenre(id, type, el) {
            isFeat = false; curGenre = id; curType = type; curPage = 1;
            resetTabs(null, el); fetchData(false);
        }

        async function loadContent(type, el) {
            isFeat = false; curGenre = null; curType = type; curPage = 1;
            resetTabs(null, el); fetchData(false);
        }

        async function fetchData(append) {
            let url = curGenre 
                ? `https://api.themoviedb.org/3/discover/${curType}?api_key=${API_KEY}&with_genres=${curGenre}&page=${curPage}&language=${curLang}`
                : `https://api.themoviedb.org/3/${curType}/popular?api_key=${API_KEY}&page=${curPage}&language=${curLang}`;
            const r = await fetch(url);
            const d = await r.json();
            const g = document.getElementById('grid');
            if(!append) g.innerHTML = "";
            d.results.forEach(m => { if(m.poster_path) g.innerHTML += render(m, curType); });
            document.getElementById('moreDiv').style.display = (d.total_pages > curPage) ? 'block' : 'none';
        }

        function loadMore() { curPage++; fetchData(true); }

        function render(m, t) {
            return `<div class="movie-card" onclick="openP('${m.id}','${t}')">
                <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                <div class="movie-title">${m.title || m.name}</div>
            </div>`;
        }

        function renderLive(name, logo, url) {
            const fallbackLogo = "https://via.placeholder.com/150/1a1d21/ff3b5c?text=LIVE";
            return `<div class="movie-card" onclick="openLive('${url}')">
                <img src="${logo || fallbackLogo}" onerror="this.src='${fallbackLogo}'">
                <div class="movie-title">${name}</div>
            </div>`;
        }

        async function loadLiveFoot() {
            isFeat = false; 
            resetTabs('tab-live');
            const g = document.getElementById('grid'); 
            g.innerHTML = "<p style='text-align:center; width:100%;'>Loading Channels... جاري التحميل</p>"; 
            
            try {
                // استخدام البروكسي لجلب ملف القنوات لتفادي حظر CORS
                const response = await fetch(PROXY + encodeURIComponent(LIVE_PLAYLIST_URL));
                const data = await response.text();
                const lines = data.split('\n');
                g.innerHTML = "";

                let currentName = "";
                let currentLogo = "";

                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) {
                        currentName = line.split(',')[1] || "Unknown Channel";
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        currentLogo = logoMatch ? logoMatch[1] : "";
                    } else if (line.startsWith('http')) {
                        let url = line.trim();
                        g.innerHTML += renderLive(currentName, currentLogo, url);
                    }
                });
            } catch (error) {
                g.innerHTML = "<p style='text-align:center; width:100%;'>Error loading channels. Please try again.</p>";
            }
            document.getElementById('moreDiv').style.display = 'none';
        }

        function openP(id, t) {
            document.getElementById('vjs-box').style.display = 'none';
            const ifr = document.getElementById('ifr');
            ifr.style.display = 'block';
            ifr.src = `https://vidsrc.me/embed/${t}?tmdb=${id}`;
            document.getElementById('playerOverlay').style.display = 'block';
        }

        function openLive(finalUrl) {
            document.getElementById('ifr').style.display = 'none';
            const vBox = document.getElementById('vjs-box');
            vBox.style.display = 'block';
            document.getElementById('playerOverlay').style.display = 'block';
            
            vBox.innerHTML = '';
            
            const video = document.createElement('video');
            video.id = 'vid';
            video.controls = true;
            video.autoplay = true;
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.backgroundColor = '#000';
            
            video.setAttribute('crossorigin', 'anonymous');
            video.setAttribute('playsinline', 'true');
            
            vBox.appendChild(video);

            // تمرير رابط البث عبر البروكسي لضمان التشغيل داخل المتصفح
            const proxiedUrl = PROXY + encodeURIComponent(finalUrl);

            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    xhrSetup: function (xhr, url) {
                        xhr.withCredentials = false;
                    }
                });
                hls.loadSource(proxiedUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Auto-play prevented"));
                });
                
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                            default: hls.destroy(); break;
                        }
                    }
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxiedUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        function closePlayer() {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('ifr').src = "";
            if (hls) { hls.destroy(); hls = null; }
            const vBox = document.getElementById('vjs-box');
            vBox.innerHTML = "";
        }

        function resetTabs(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
        }

        async function handleSearch(e) {
            const q = e.target.value;
            if(q.length > 2) {
                const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}&language=${curLang}`);
                const d = await r.json();
                const g = document.getElementById('grid'); g.innerHTML = "";
                d.results.forEach(m => { if(m.poster_path) g.innerHTML += render(m, m.media_type); });
                document.getElementById('moreDiv').style.display = 'none';
            } else if(q.length === 0) loadLiveFoot(); 
        }

        window.onload = loadLiveFoot;
    </script>
</body>
</html>
