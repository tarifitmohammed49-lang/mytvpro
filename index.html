<div class="search-container">
        <input type="text" id="searchInput" placeholder="Search Movies & Series..." onkeyup="handleSearch(event)">
    </div>

    <main id="moviesGrid" class="movie-grid">
        </main>

    <script>
        // ... (كل المتغيرات والـ API KEY تبقى كما هي) ...

        // تحديث دالة Live Foot لتظهر القنوات المحقونة فقط
        function loadLiveFoot() {
            isFeatured = false; currentGenre = null; currentPage = 1;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btnLiveFoot').classList.add('active');
            
            const grid = document.getElementById('moviesGrid');
            const items = grid.children;
            
            let hasChannels = false;
            for (let item of items) {
                // نبحث عن العناصر التي تحتوي على دالة تشغيل البث المباشر
                if (item.outerHTML.includes('openLivePlayer')) {
                    item.style.display = 'block';
                    hasChannels = true;
                } else {
                    item.style.display = 'none';
                }
            }
            
            // إذا كانت المنطقة فارغة (قبل تشغيل القناص)
            if (!hasChannels) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px;">جاري تحديث الروابط... تأكد من تشغيل GitHub Actions</div>';
            }
            
            document.getElementById('loadMoreSection').style.display = 'none';
        }

        // تحديث دالة loadFeatured لكي لا تمسح علامات الحقن
        async function loadFeatured() {
            isFeatured = true; currentGenre = null; currentPage = 1;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btnFeatured').classList.add('active');
            
            const grid = document.getElementById('moviesGrid');
            
            // نحتفظ بالقنوات المحقونة مخفية ونعرض الأفلام فقط
            const channelsHtml = grid.innerHTML.match(/[\s\S]*/);
            grid.innerHTML = channelsHtml ? channelsHtml[0] : '';
            
            const featuredItems = [{id:93405,type:'tv'},{id:100088,type:'tv'},{id:1396,type:'tv'},{id:76479,type:'movie'},{id:157336,type:'movie'},{id:634649,type:'movie'},{id:82452,type:'tv'},{id:111110,type:'tv'}];
            
            for(let item of featuredItems) {
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/${item.type}/${item.id}?api_key=${window.API_KEY}&language=${currentLang}`);
                    const m = await res.json();
                    if(m.id) grid.innerHTML += `<div class="movie-card" onclick="openPlayer('${m.id}', '${item.type}')"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${m.title || m.name} online free" loading="lazy"><div class="movie-title">${m.title || m.name}</div></div>`;
                } catch(e) {}
            }
            document.getElementById('loadMoreSection').style.display = 'block'; 
        }

        // ... (باقي الدوال كما هي تماماً) ...
    </script>
