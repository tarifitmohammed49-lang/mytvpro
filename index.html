<!DOCTYPE html>
<html lang="ar" dir="ltr"> 
<head>
    <title>MYTVPRO - Simo Final</title>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    
    <link rel="icon" type="image/x-icon" href="https://mytvpro1.github.io/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

    <style>
        :root { --main-red: #ff3b5c; --bg-dark: #0b0e11; --card-bg: #1a1d21; }
        body { background-color: var(--bg-dark); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; user-select: none; overflow-x: hidden; }
        
        /* تصميم الهيدر واللوجو الخاص بك */
        .header { display: flex; flex-direction: column; align-items: center; padding: 15px; gap: 10px; }
        .logo { color: var(--main-red); font-size: 28px; font-weight: bold; cursor: pointer; text-shadow: 0 0 10px rgba(255, 59, 92, 0.5); }
        
        /* تصميم صندوق تحميل APK */
        .apk-box { background: var(--card-bg); border: 1px solid var(--main-red); border-radius: 15px; padding: 15px; margin: 10px auto; max-width: 500px; display: flex; align-items: center; gap: 15px; }
        .apk-btn { background: var(--main-red); color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; }

        /* التبويبات */
        .nav-tabs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .tab { background: var(--card-bg); color: white; padding: 10px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab.active { background: var(--main-red); box-shadow: 0 0 15px var(--main-red); }
        
        /* البحث */
        .search-container { width: 90%; max-width: 600px; margin: 0 auto 20px; }
        .search-container input { width: 100%; padding: 14px; border-radius: 30px; border: 1px solid #333; background: var(--card-bg); color: white; outline: none; text-align: center; }

        /* الشبكة */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 10px; }
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .movie-card:hover { border-color: var(--main-red); transform: scale(1.03); }
        .movie-card img { width: 100%; height: 200px; object-fit: cover; }
        .movie-title { padding: 8px; font-size: 12px; text-align: center; font-weight: bold; }

        /* المشغل في المنتصف كما طلبت */
        #videoPlayerContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        #playerContent { width: 100%; max-width: 800px; position: relative; }
        #liveVideoPlayer, #mainPlayer { width: 100%; height: 50vh; background: #000; border: 2px solid var(--main-red); border-radius: 10px; }
        .back-btn { background: var(--main-red); color: white; border: none; padding: 12px 50px; border-radius: 30px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="location.reload()">MYTVPRO</div>
    </header>

    <div class="apk-box">
        <div style="flex-grow:1; font-size:12px;">
            <b>Simo TV App (OFFICIAL)</b><br>
            حمل التطبيق لمشاهدة القنوات مجاناً
        </div>
        <a href="https://www.appcreator24.com/app3987277-rntplh" class="apk-btn">DOWNLOAD APK</a>
    </div>

    <div class="nav-tabs">
        <button id="btnFeatured" class="tab active" onclick="loadFeatured()">⭐ Featured</button>
        <button id="btnLiveFoot" class="tab" onclick="loadLiveFoot()">⚽ Live Foot</button>
        <button id="btnMovies" class="tab" onclick="loadContent('movie')">Movies</button>
        <button id="btnSeries" class="tab" onclick="loadContent('tv')">Series</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search Movies & Series..." onkeyup="handleSearch(event)">
    </div>

    <main id="moviesGrid" class="movie-grid"></main>

    <div id="videoPlayerContainer">
        <div id="playerContent">
            <video id="liveVideoPlayer" controls playsinline></video>
            <iframe id="mainPlayer" style="display:none;" allowfullscreen></iframe>
            <center><button class="back-btn" onclick="closePlayer()">BACK / رجوع</button></center>
        </div>
    </div>

    <script src="channels_data.js"></script>

    <script>
        window.API_KEY = "acd9d88a83b5272588d21d5b4401eab6"; 

        async function loadFeatured() {
            setActiveTab('btnFeatured');
            const items = [{id:93405,t:'tv'},{id:1396,t:'tv'},{id:157336,t:'movie'},{id:634649,t:'movie'}];
            const grid = document.getElementById('moviesGrid'); grid.innerHTML = "";
            for(let i of items) {
                const res = await fetch(`https://api.themoviedb.org/3/${i.t}/${i.id}?api_key=${window.API_KEY}`);
                const m = await res.json();
                grid.innerHTML += `<div class="movie-card" onclick="openPlayer('${m.id}', '${i.t}')"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="movie-title">${m.title || m.name}</div></div>`;
            }
        }

        function loadLiveFoot() {
            setActiveTab('btnLiveFoot');
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = "";
            
            // التأكد من قراءة البيانات من الملف الخارجي مهما كان اسم المصفوفة
            let channels = window._0xSimoData || window.channels || [];
            
            if (channels.length > 0) {
                channels.forEach(ch => {
                    grid.innerHTML += `
                        <div class="movie-card" onclick="openLivePlayer('${ch.url}')">
                            <img src="${ch.logo}" style="object-fit:contain; background:#000; padding:10px;">
                            <div class="movie-title">${ch.name}</div>
                        </div>`;
                });
            } else {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:var(--main-red);'>⚠️ لم يتم العثور على قنوات. تأكد من ملف channels_data.js</p>";
            }
        }

        function openLivePlayer(url) {
            const container = document.getElementById('videoPlayerContainer');
            const video = document.getElementById('liveVideoPlayer');
            container.style.display = 'flex';
            video.style.display = 'block';
            document.getElementById('mainPlayer').style.display = 'none';
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
                video.play();
            }
        }

        function openPlayer(id, type) {
            const container = document.getElementById('videoPlayerContainer');
            container.style.display = 'flex';
            document.getElementById('liveVideoPlayer').style.display = 'none';
            const iframe = document.getElementById('mainPlayer');
            iframe.style.display = 'block';
            iframe.src = `https://vidsrc.me/embed/${type}?tmdb=${id}`;
        }

        function closePlayer() {
            document.getElementById('videoPlayerContainer').style.display = 'none';
            const v = document.getElementById('liveVideoPlayer');
            v.pause(); v.src = "";
            document.getElementById('mainPlayer').src = "";
        }

        function setActiveTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = loadFeatured;
    </script>
</body>
</html>
