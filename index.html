<!DOCTYPE html>
<html lang="ar" dir="ltr"> 
<head>
    <title>MYTVPRO - Simo Final Official</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* سأضع هنا الستايل الخاص بك الذي أرسلته لي دون تغيير */
        :root { --main-red: #ff3b5c; --bg-dark: #0b0e11; --card-bg: #1a1d21; }
        body { background-color: var(--bg-dark); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; user-select: none; overflow-x: hidden; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100000; }
        /* [باقي الستايل الخاص بك...] */
        /* أضفت فقط هذا التنسيق لضمان ظهور لوجو القنوات بشكل ممتاز */
        .channel-logo-fix { object-fit: contain !important; background: #000; padding: 10px; height: 150px !important; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <header class="header">
        <h1 class="logo" onclick="location.reload()">MYTVPRO</h1>
        <div class="lang-container">
            <span class="lang-btn active" onclick="changeLanguage('en', this)">EN</span>
            <span class="lang-btn" onclick="changeLanguage('ar', this)">AR</span>
            </div>
    </header>

    <div class="apk-download-box">
        <img src="https://mytvpro1.github.io/favicon.ico" class="apk-icon">
        <div class="apk-text">
            <b>Simo TV App (OFFICIAL)</b>
            AR: لمشاهدة القنوات الرياضية بالمجان حمل التطبيق
        </div>
        <a href="https://www.appcreator24.com/app3987277-rntplh" class="apk-btn">DOWNLOAD APK</a>
    </div>

    <div class="nav-tabs">
        <button id="btnFeatured" class="tab active" onclick="loadFeatured()">⭐ Featured</button>
        <button id="btnLiveFoot" class="tab" onclick="loadLiveFoot()">⚽ Live Foot</button>
        <button id="btnMovies" class="tab" onclick="loadContent('movie')">Movies</button>
        <button id="btnSeries" class="tab" onclick="loadContent('tv')">Series</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="handleSearch(event)">
    </div>

    <main id="moviesGrid" class="movie-grid"></main>

    <div id="videoPlayerContainer">
        <div class="player-wrapper">
            <div id="adOverlay" class="ad-overlay" onclick="triggerAd()"></div>
            <button class="back-btn" id="playerBackBtn" onclick="closePlayer()">BACK</button>
            <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            <video id="liveVideoPlayer" controls playsinline style="display:none; width:100%; height:50vh;"></video>
        </div>
    </div>

    <script src="channels_data.js"></script>

    <script>
        // دالة إصلاح عرض القنوات (Live Foot) داخل تصميم موقعك
        async function loadLiveFoot() {
            isFeatured = false; 
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btnLiveFoot').classList.add('active');
            
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = "<p style='text-align:center; width:100%; color:var(--main-red);'>🔄 Loading Channels...</p>";

            try {
                // محاولة جلب البيانات من الملف الخارجي
                let channels = [];
                if (typeof _0xSimoData !== 'undefined') {
                    channels = _0xSimoData;
                } else if (typeof channels !== 'undefined') {
                    channels = channels;
                }

                grid.innerHTML = ""; 
                if (channels && channels.length > 0) {
                    channels.forEach(ch => {
                        // استخدام نفس تصميم "الكارط" (movie-card) الخاص بموقعك
                        grid.innerHTML += `
                            <div class="movie-card" onclick="openLivePlayer('${ch.url}')">
                                <img src="${ch.logo}" class="channel-logo-fix" onerror="this.src='https://mytvpro1.github.io/favicon.ico'">
                                <div class="movie-title">${ch.name}</div>
                            </div>`;
                    });
                } else {
                    grid.innerHTML = "<p style='text-align:center; width:100%;'>⚠️ القنوات غير موجودة في ملف channels_data.js</p>";
                }
            } catch (error) {
                grid.innerHTML = "<p style='text-align:center; width:100%;'>❌ Error Loading Data</p>";
            }
            document.getElementById('loadMoreSection').style.display = 'none';
        }

        // دالة تشغيل البث المباشر (المعدلة لتعمل مع Shaka أو HLS)
        function openLivePlayer(url) {
            const video = document.getElementById('liveVideoPlayer');
            const iframe = document.getElementById('mainPlayer');
            const container = document.getElementById('videoPlayerContainer');
            
            iframe.style.display = 'none';
            iframe.src = '';
            video.style.display = 'block';
            container.style.display = 'block';

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
                video.play();
            }
        }

        // [باقي دوال الموقع الأصلية الخاصة بك: loadFeatured, loadContent, closePlayer...]
        // تأكد من نسخ باقي الدوال من كودك الأصلي هنا
    </script>
</body>
</html>
