<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTVPRO - Simo Edition</title>
    
    <script src="https://millionairelucidlytransmitted.com/3a/8c/c1/3a8cc133791bde8e0230332b817de46a.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; margin-bottom: 20px; }
        .logo { color: #ff3b5c; font-size: 24px; font-weight: bold; cursor: pointer; }
        .tab { background: #1a1d21; color: white; padding: 10px 20px; border-radius: 20px; border: 1px solid #333; cursor: pointer; font-weight: bold; margin: 5px; }
        .tab.active { background: #ff3b5c; border-color: #ff3b5c; }
        .live-btn { background: #000; border: 2px solid #ff3b5c; color: white; padding: 12px 30px; border-radius: 50px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(255, 59, 92, 0.3); }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .movie-card { background: #1a1d21; border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .movie-card img { width: 100%; height: 200px; object-fit: cover; }
        #videoPlayerContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; padding-top: 50px; overflow-y: auto; }
        iframe, video { width: 90%; max-width: 800px; aspect-ratio: 16/9; border: 2px solid #ff3b5c; border-radius: 15px; background: #000; }
        .channels-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 500px; max-height: 80vh; background: #1a1d21; border: 2px solid #ff3b5c; border-radius: 20px; z-index: 6000; padding: 20px; overflow-y: auto; }
        .channels-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .channel-item { background: #000; padding: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #333; font-size: 11px; }
        .channel-item img { width: 30px; height: 30px; object-fit: contain; display: block; margin: 0 auto 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">MYTVPRO</div>
        <div>
            <button class="tab active" id="btnMovies" onclick="loadContent('movie')">أفلام</button>
            <button class="tab" id="btnSeries" onclick="loadContent('tv')">مسلسلات</button>
        </div>
    </div>

    <div class="live-btn" onclick="openModal()">
        <span style="height: 10px; width: 10px; background: red; border-radius: 50%; display: inline-block; animation: blink 1s infinite;"></span>
        عرض القنوات المباشرة الشغالة
    </div>

    <div id="moviesGrid" class="movie-grid"></div>

    <div id="channelsModal" class="channels-modal">
        <button style="float:left; background:red; color:white; border:none; border-radius:5px; cursor:pointer;" onclick="closeModal()">X</button>
        <h3 style="color:#ff3b5c">قنواتك الشغالة</h3>
        <div id="dynamicChannelsGrid" class="channels-grid">
            <p style="grid-column: 1/-1;">جاري جلب القنوات...</p>
        </div>
    </div>

    <div id="videoPlayerContainer">
        <button class="tab" onclick="closePlayer()">رجوع للخلف</button>
        <div style="margin: 15px auto; max-width: 728px;">
            <script>
                atOptions = { 'key' : '3c7ca9cd02f9ed4fece203c54d5491cd', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
            </script>
            <script src="https://millionairelucidlytransmitted.com/3c7ca9cd02f9ed4fece203c54d5491cd/invoke.js"></script>
        </div>
        <iframe id="mainPlayer" src="" allowfullscreen style="display:none;"></iframe>
        <video id="livePlayer" controls style="display:none;"></video>
    </div>

    <script>
        const API_KEY = '715fb05852af662217013d8380237f2a';
        let hlsPlayer = null;

        // جلب الأفلام
        async function loadContent(type) {
            document.getElementById('btnMovies').classList.toggle('active', type === 'movie');
            document.getElementById('btnSeries').classList.toggle('active', type === 'tv');
            const res = await fetch(`https://api.themoviedb.org/3/${type}/popular?api_key=${API_KEY}&language=ar&page=1`);
            const data = await res.json();
            document.getElementById('moviesGrid').innerHTML = data.results.map(item => `
                <div class="movie-card" onclick="openPlayer('${item.id}', '${type}')">
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                    <div style="padding:5px; font-size:11px;">${item.title || item.name}</div>
                </div>`).join('');
        }

        // جلب القنوات من ملف الروابط (ليتم الحفاظ على كل القنوات الشغالة)
        async function fetchLiveChannels() {
            try {
                const res = await fetch('links.json?v=' + Date.now());
                const data = await res.json();
                const grid = document.getElementById('dynamicChannelsGrid');
                grid.innerHTML = '';
                
                // نجمع كل القنوات الموجودة في الملف (beIN، Sports، أو غيرها)
                let all = [];
                if (data.beIN_Sports) all = [...all, ...data.beIN_Sports];
                if (data.Sports) all = [...all, ...data.Sports];
                if (data.fr_sport) all = [...all, ...data.fr_sport];

                all.forEach(ch => {
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    div.onclick = () => startLive(ch.url);
                    div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/30'"> ${ch.name}`;
                    grid.appendChild(div);
                });
            } catch (e) { console.log("خطأ في جلب الروابط"); }
        }

        function openPlayer(id, type) {
            const player = document.getElementById('mainPlayer');
            player.style.display = 'block';
            document.getElementById('livePlayer').style.display = 'none';
            player.src = `https://vidsrc.me/embed/${type}?tmdb=${id}`;
            document.getElementById('videoPlayerContainer').style.display = 'block';
        }

        function startLive(url) {
            closeModal();
            document.getElementById('mainPlayer').style.display = 'none';
            const video = document.getElementById('livePlayer');
            video.style.display = 'block';
            if (hlsPlayer) { hlsPlayer.destroy(); }
            if (Hls.isSupported()) {
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
            document.getElementById('videoPlayerContainer').style.display = 'block';
        }

        function closePlayer() {
            document.getElementById('videoPlayerContainer').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
            document.getElementById('livePlayer').pause();
        }

        function openModal() { 
            document.getElementById('channelsModal').style.display = 'block'; 
            fetchLiveChannels(); 
        }
        function closeModal() { document.getElementById('channelsModal').style.display = 'none'; }

        window.onload = () => loadContent('movie');
    </script>
</body>
</html>
