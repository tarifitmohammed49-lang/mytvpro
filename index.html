<!DOCTYPE html>
<html lang="en" dir="ltr" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTVPRO - Movies & Series Edition</title>
    
   ​<meta name="monetag" content="713269932f9e6998423e0592d22c4429">

    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; transition: 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 2%; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .logo { color: #ff3b5c; font-size: 24px; font-weight: bold; text-decoration: none; cursor: pointer; }
        .lang-container { display: flex; gap: 12px; align-items: center; }
        .lang-btn { color: #ff3b5c; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; text-transform: uppercase; }
        .lang-btn.active { color: #ffffff; border-bottom: 2px solid #ff3b5c; }
        .nav-tabs { display: flex; gap: 15px; }
        .tab { background: #1a1d21; color: white; padding: 8px 25px; border-radius: 20px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .tab.active { background: #ff3b5c; }
        .search-bar { width: 100%; max-width: 600px; margin: 0 auto 30px; }
        .search-bar input { width: 100%; padding: 12px 25px; border-radius: 25px; border: 1px solid #333; background: #1a1d21; color: white; outline: none; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 0 2%; }
        .movie-card { background: #1a1d21; border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.03); border-color: #ff3b5c; }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; }
        .movie-title { padding: 12px; font-size: 13px; text-align: center; font-weight: bold; }
        #videoPlayerContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 4000; backdrop-filter: blur(10px); overflow-y: auto; padding: 40px 0; text-align: center; }
        #mainPlayer { width: 90%; max-width: 800px; height: 50vh; border: 3px solid #ff3b5c; border-radius: 15px; background: #000; box-shadow: 0 0 30px rgba(255, 59, 92, 0.4); margin: 0 auto; }
        .ad-banner-box { width: 90%; max-width: 728px; min-height: 90px; margin: 25px auto; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .disclaimer-section { background: #1a1d21; border-top: 2px solid #ff3b5c; padding: 30px 5%; margin-top: 50px; font-size: 12px; color: #888; line-height: 1.6; }
        .disclaimer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; text-align: left; }
        @media (max-width: 768px) { .disclaimer-grid { grid-template-columns: 1fr; } .ad-banner-box { max-width: 320px; } }
        .disclaimer-box h4 { color: #ff3b5c; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="videoPlayerContainer">
        <button class="tab" style="margin-bottom:20px; background:#1a1d21; border:1px solid #ff3b5c; display:inline-block;" id="backBtn" onclick="closePlayer()">BACK</button>
        
        <div class="ad-banner-box" id="ad-top">
            <span style="color:#555">AD SPACE</span>
        </div>

        <iframe id="mainPlayer" src="" allowfullscreen style="border:none; margin:0 auto;"></iframe>

        <div class="ad-banner-box" id="ad-bottom">
            <span style="color:#555">AD SPACE</span>
        </div>
    </div>

    <div class="header">
        <div class="logo" onclick="location.reload()">MYTVPRO</div>
        <div class="nav-tabs">
            <button id="btnMovies" class="tab active" onclick="loadContent('movie')">Movies</button>
            <button id="btnSeries" class="tab" onclick="loadContent('tv')">Series</button>
        </div>
        <div class="lang-container">
            <span class="lang-btn active" id="lang-en" onclick="changeLanguage('en')">EN</span>
            <span class="lang-btn" id="lang-fr" onclick="changeLanguage('fr')">FR</span>
            <span class="lang-btn" id="lang-de" onclick="changeLanguage('de')">DE</span>
            <span class="lang-btn" id="lang-nl" onclick="changeLanguage('nl')">NL</span>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search here..." onkeyup="handleSearch(event)">
    </div>

    <div class="movie-grid" id="moviesGrid"></div>

    <footer class="disclaimer-section">
        <div class="disclaimer-grid">
            <div class="disclaimer-box" id="disc-en">
                <h4>Disclaimer (EN)</h4>
                <p>MYTVPRO does not host any video files. All links are found freely on the internet.</p>
            </div>
            <div class="disclaimer-box" id="disc-fr">
                <h4>Avertissement (FR)</h4>
                <p>MYTVPRO n'héberge aucun fichier vidéo. Tous les liens sont trouvés gratuitement sur Internet.</p>
            </div>
        </div>
        <div style="text-align: center; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
            &copy; 2026 MYTVPRO - Movies & Series Edition.
        </div>
    </footer>

    <script src='https://alwingulla.com/act/files/tag.min.js?z=8985642' data-cfasync='false' async></script>

    <script>
        const API_KEY = '715fb05852af662217013d8380237f2a';
        let currentType = 'movie', currentLang = 'en';

        const translations = {
            en: { movies: "Movies", series: "Series", search: "Search movies & series...", back: "BACK" },
            fr: { movies: "Films", series: "Séries", search: "Chercher ici...", back: "RETOUR" },
            de: { movies: "Filme", series: "Serien", search: "Suchen...", back: "ZURÜCK" },
            nl: { movies: "Films", series: "Series", search: "Zoeken...", back: "TERUG" }
        };

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            const t = translations[lang] || translations.en;
            document.getElementById('btnMovies').innerText = t.movies;
            document.getElementById('btnSeries').innerText = t.series;
            document.getElementById('searchInput').placeholder = t.search;
            document.getElementById('backBtn').innerText = t.back;
            loadContent(currentType);
        }

        async function loadContent(type) {
            currentType = type;
            document.getElementById('btnMovies').classList.toggle('active', type === 'movie');
            document.getElementById('btnSeries').classList.toggle('active', type === 'tv');
            try {
                const res = await fetch(`https://api.themoviedb.org/3/${type}/popular?api_key=${API_KEY}&language=${currentLang}&page=1`);
                const data = await res.json();
                document.getElementById('moviesGrid').innerHTML = data.results.map(item => `
                    <div class="movie-card" onclick="triggerAdAndOpen('${item.id}')">
                        <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                        <div class="movie-title">${item.title || item.name}</div>
                    </div>`).join('');
            } catch(e) {}
        }

        function triggerAdAndOpen(id) {
            if (typeof show_8985642 === 'function') {
                show_8985642().then(() => { openPlayer(id); }).catch(() => { openPlayer(id); });
            } else {
                openPlayer(id);
            }
        }

        function openPlayer(id) {
            const player = document.getElementById('mainPlayer');
            player.src = `https://vidsrc.me/embed/${currentType}?tmdb=${id}`;
            const container = document.getElementById('videoPlayerContainer');
            container.style.display = 'block'; 
            container.scrollTop = 0; 
        }

        function closePlayer() {
            document.getElementById('videoPlayerContainer').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
        }

        async function handleSearch(event) {
            const query = event.target.value.toLowerCase();
            if (query.length === 0) { loadContent(currentType); return; }
            if (query.length > 2) {
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/search/${currentType}?api_key=${API_KEY}&language=${currentLang}&query=${query}`);
                    const data = await res.json();
                    document.getElementById('moviesGrid').innerHTML = data.results.map(item => `
                        <div class="movie-card" onclick="triggerAdAndOpen('${item.id}')">
                            <img src="${item.poster_path ? 'https://image.tmdb.org/t/p/w500' + item.poster_path : 'https://via.placeholder.com/500x750?text=No+Image'}">
                            <div class="movie-title">${item.title || item.name}</div>
                        </div>`).join('');
                } catch(e) {}
            }
        }
        window.onload = () => loadContent('movie');
    </script>
</body>
</html>
