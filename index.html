<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTVPRO - Global Streaming</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <style>
        /* [إبقاء كل الستايلات الخاصة بك كما هي بدون تغيير أي لون] */
        :root { --main-red: #ff3b5c; --bg-dark: #0b0e11; --card-bg: #1a1d21; }
        body { background-color: var(--bg-dark); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; user-select: none; }
        .header { text-align: center; padding: 20px 0; }
        .logo { color: var(--main-red); font-size: 28px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; cursor: pointer; }
        .lang-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .lang-btn { color: #888; font-size: 12px; font-weight: bold; cursor: pointer; text-decoration: none; padding: 5px; }
        .lang-btn.active { color: #fff; border-bottom: 2px solid var(--main-red); }
        .apk-box { border: 2px solid var(--main-red); border-radius: 15px; padding: 15px; max-width: 600px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .nav-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tab { background: var(--card-bg); color: #fff; padding: 10px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab.active { background: var(--main-red); }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; text-align: center; border: 1px solid #222; }
        .movie-card img { width: 100%; height: 190px; object-fit: cover; }
        .movie-title { padding: 8px; font-size: 11px; height: 35px; }

        /* تعديل فقط على طبقة المشغل لإضافة الحماية البصرية */
        #playerOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; }
        .video-wrapper { position: relative; width: 100%; height: 100%; }
        .close-p { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--main-red); color: #fff; border: none; padding: 10px 40px; border-radius: 20px; cursor: pointer; font-weight: bold; z-index: 10005; }
        
        /* أرقام التمويه التي طلبناها */
        .ghost-num { position: absolute; color: rgba(255,255,255,0.2); font-size: 14px; z-index: 10002; pointer-events: none; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="location.reload()">MYTVPRO</div>
        <div class="lang-container" id="langContainer"></div>
    </header>

    <div class="apk-box">
        <div class="apk-info"><img src="https://mytvpro1.github.io/favicon.ico" width="40"><div><b id="apk-t">Simo TV App (OFFICIAL)</b><br><span id="apk-d">Download the app to watch sports channels for free.</span></div></div>
        <a href="https://www.appcreator24.com/app3987277-rntplh" class="apk-btn">DOWNLOAD APK</a>
    </div>

    <div class="nav-tabs">
        <button id="tab-feat" class="tab active" onclick="loadFeatured()">⭐ Featured</button>
        <button id="tab-live" class="tab" onclick="loadLiveFoot()">⚽ Live Foot</button>
        <button class="tab" onclick="loadGenre(16, 'movie', this)">🌀 Anime</button>
        <button class="tab" onclick="loadContent('movie', this)">Movies</button>
        <button class="tab" onclick="loadContent('tv', this)">Series</button>
    </div>

    <div class="movie-grid" id="grid"></div>

    <div id="playerOverlay">
        <button class="close-p" onclick="closePlayer()">BACK / رجوع</button>
        <div class="video-wrapper">
            <div id="simonum" class="ghost-num"></div>
            <iframe id="ifr" width="100%" height="100%" frameborder="0" allowfullscreen style="display:none;"></iframe>
            <div id="vjs-box" style="display:none; width:100%; height:100%;"></div>
        </div>
    </div>

    <script src="channels_data.js"></script>
    <script>
        // [نفس ثوابتك]
        const API_KEY = "acd9d88a83b5272588d21d5b4401eab6";
        const SIMO_WORKER = "https://cool-pine-e5b8.mytvpropagesdev.workers.dev/"; // رابط الوركر الخاص بك
        let curLang = 'en', curPage = 1, curType = 'movie', player = null;

        // [دوال اللغات و TMDB الأصلية دون أي تغيير]
        // ... (سأختصرها لك لكي لا يطول الكود، لكنك تضع دوالك الأصلية هنا) ...

        // *** التعديل الجوهري فقط في هذه الدالة ***
        function openLive(enc) {
            const url = atob(enc); 
            // خدعة استخراج الـ Path ليمر عبر الوركر
            let urlPath = url.split(':2082/')[1]; 
            const protectedUrl = `${SIMO_WORKER}?path=${urlPath}`;

            document.getElementById('ifr').style.display = 'none';
            const vBox = document.getElementById('vjs-box');
            vBox.style.display = 'block';
            document.getElementById('playerOverlay').style.display = 'block';
            
            vBox.innerHTML = '<video id="vid" class="video-js vjs-default-skin" controls width="100%" height="100%"></video>';
            player = videojs('vid');
            player.src({ src: protectedUrl, type: 'application/x-mpegURL' });
            player.play();
            
            // تشغيل الأرقام الوهمية للتمويه
            startGhosting();
        }

        function startGhosting() {
            const numBox = document.getElementById('simonum');
            setInterval(() => {
                numBox.innerText = Math.floor(Math.random() * 9999999);
                numBox.style.top = Math.random() * 80 + "%";
                numBox.style.left = Math.random() * 80 + "%";
            }, 5000);
        }

        function closePlayer() {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('ifr').src = "";
            if(player) { player.dispose(); player = null; }
        }
        
        // أعد لصق باقي دوالك (fetchData, render, openP) هنا كما كانت في كودك الأصلي
    </script>
</body>
</html>
