name: Update ProPush Stats to Cloudflare

on:
  schedule:
    - cron: '0 0 * * *' # يعمل تلقائياً كل يوم الساعة 12 ليلاً
  workflow_dispatch: # يتيح لك تشغيله يدوياً أيضاً

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Fetch Data from ProPush
        run: |
          curl -H "Authorization: Bearer ${{ secrets.PROPUSH_TOKEN }}" \
          https://app.propush.me/api/v1/stats > stats.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "Simo-Final" # تأكد من اسم مشروعك هنا
          directory: "." 
