name: Simo Sniper - Global Sports

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Sniping Links
        run: python sniper_script.py
      - name: Save to Repository
        run: |
          git config --global user.name "Simo-Sniper"
          git config --global user.email "actions@github.com"
          git add links.json
          git commit -m "Update links with international channels" || exit 0
          git push
