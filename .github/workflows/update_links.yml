name: Update MyTV Channels

on:
  workflow_dispatch: # لتشغيل التحديث يدوياً في أي وقت
  schedule:
    - cron: '0 0 * * *' # تحديث تلقائي كل يوم عند منتصف الليل

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sniper
        env:
          # هذا السطر يربط السكربت بالرابط السري الذي أضفته في الإعدادات
          IPTV_URL: ${{ secrets.IPTV_URL }}
        run: python sniper_m3u8.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # التأكد من إضافة ملف القنوات الجديد
          if [ -f channels.json ]; then
            git add channels.json
            git commit -m "Update channels.json with fresh links" || echo "No changes to commit"
            git push
          else
            echo "Error: channels.json not found!"
            exit 1
          fi
