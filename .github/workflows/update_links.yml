name: Simo Sniper Hourly Update

on:
  schedule:
    - cron: '0 * * * *' # سيعمل تلقائياً كل ساعة
  push:
    branches: [ main ]
  workflow_dispatch: # يتيح لك تشغيله يدوياً من GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sniper Script
        run: python sniper_script.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Simo-Sniper-Bot"
          git config --global user.email "actions@github.com"
          git add links.json
          git commit -m "🚀 Sniper: Auto-update links $(date)" || echo "No changes to commit"
          git push
