name: Simo Sniper Final Fix
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write  # هذا السطر هو الذي سيجعل العلامة خضراء

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests
      - run: python Simo_Sniper.py
      - run: |
          git config --local user.name "Simo-Developer"
          git add links.json
          git commit -m "🚀 Update Links" || exit 0
          git push
