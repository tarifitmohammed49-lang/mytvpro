name: Update Live Channels

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        # ✅ تم تصحيح هذا السطر ليعمل بنجاح
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Simo Sniper
        # تأكد أن اسم الملف هو Simo_Sniper.py
        run: python Simo_Sniper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Simo Sniper Bot"
          git add links.json
          git commit -m "Update links.json" || exit 0
          git push
