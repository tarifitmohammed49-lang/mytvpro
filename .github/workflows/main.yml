name: Update Live Channels Sniper

on:
  schedule:
    - cron: '0 * * * *' # يعمل تلقائياً كل ساعة
  workflow_dispatch: # يتيح لك تشغيله يدوياً من تبويب Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # ضروري لجلب كل التاريخ وتفادي مشاكل الـ Push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sniper Script
        run: python update_channels.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # جلب آخر التغييرات من المستودع لتجنب تعارض الـ Push
          git pull --rebase origin main
          
          # إضافة الملف المحدث
          git add channels_data.js
          
          # التحقق مما إذا كانت هناك تغييرات فعلاً قبل عمل Commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: New Tokenized Links $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
