name: Update Live Channels Sniper

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Encrypt and Update Channels
        env:
          MY_CHANNELS_LIST: ${{ secrets.MY_CHANNELS_LIST }}
        run: |
          # تحويل البيانات إلى Base64 للحماية
          ENCODED_DATA=$(echo "$MY_CHANNELS_LIST" | base64 -w 0)
          
          # إنشاء ملف البيانات المشفر
          echo "var _0xSimoEncoded = '$ENCODED_DATA';" > channels_data.js
          echo "var _0xSimoData = JSON.parse(atob(_0xSimoEncoded));" >> channels_data.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add channels_data.js
          git commit -m "Auto-update & Encrypt Channels" || echo "No changes"
          git push origin main
