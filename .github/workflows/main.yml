name: Update Live Channels Sniper

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sniper Script
        run: python update_channels.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. تسجيل التغييرات أولاً (حل مشكلة unstaged changes)
          git add channels_data.js
          
          # 2. عمل Commit مؤقت لتنظيف بيئة العمل
          git commit -m "Auto-update: New Tokenized Links $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          
          # 3. الآن يمكن عمل pull و rebase بأمان
          git pull --rebase origin main
          
          # 4. الرفع النهائي
          git push origin main
