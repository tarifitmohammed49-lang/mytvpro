name: Update Live Channels Sniper

on:
  schedule:
    - cron: '0 * * * *' # يعمل تلقائياً كل ساعة
  workflow_dispatch: # يتيح لك تشغيله يدوياً بنقرة زر

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sniper Script
        run: python update_channels.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          touch channel_data.js
          git add channel_data.js
          git commit -m "Auto-update channels list" || echo "No changes to commit"
          git push
